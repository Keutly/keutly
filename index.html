<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Premier Site</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #94a3b8;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 30px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>MonSite</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Bienvenue sur mon site</h2>
  <p>Un design moderne avec HTML, CSS et JavaScript</p>
  <button class="btn" onclick="showMessage()">Clique moi</button>
</section>

<section class="cards">
  <div class="card">
    <h3>Rapide</h3>
    <p>Site optimisé pour la performance.</p>
  </div>
  <div class="card">
    <h3>Moderne</h3>
    <p>Design propre et élégant.</p>
  </div>
  <div class="card">
    <h3>Responsive</h3>
    <p>S'adapte à tous les écrans.</p>
  </div>
</section>

<footer>
  <p>© 2026 MonSite - Tous droits réservés</p>
</footer>

<script>
  function showMessage() {
    alert("Bienvenue sur ton premier site web ! 🚀");
  }
</script>

</body>
</html>
